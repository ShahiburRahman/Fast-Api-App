services:
  - name: fast-api-app
    type: web
    runtime: python
    plan: free
    region: singapore
    autoDeployTrigger: commit
    buildCommand: pip install -e .
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
